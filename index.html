    <meta name="description" content="Smart kitchen management for meal planning, recipes, and inventory">
    <meta name="theme-color" content="#ffffff">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <style>
        html, body {
            max-width: 100vw;
            overflow-x: hidden;
            position: relative;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fcfcfc;
            color: #111827;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        /* Custom scrollbar for minimalist feel */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #d1d5db; }

        /* Utility for clean horizontal pickers */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Markdown Styles for Chat Bubbles */
        .markdown-body h1, .markdown-body h2 { font-weight: 700; color: #111827; margin-top: 1.5rem; margin-bottom: 0.75rem; border-bottom: 1px solid #f3f4f6; padding-bottom: 0.25rem; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .markdown-body h3 { font-weight: 700; color: #374151; margin-top: 1rem; margin-bottom: 0.5rem; font-size: 1rem; }
        .markdown-body p { margin-bottom: 1rem; line-height: 1.6; }
        .markdown-body ul, .markdown-body ol { margin-bottom: 1rem; padding-left: 1.25rem; }
        .markdown-body ul { list-style-type: disc; }
        .markdown-body ol { list-style-type: decimal; }
        .markdown-body li { margin-bottom: 0.25rem; }
        .markdown-body strong { font-weight: 700; color: #111827; }
        .markdown-body blockquote { border-left: 3px solid #e5e7eb; padding-left: 1rem; font-style: italic; color: #6b7280; margin: 1rem 0; }
        .markdown-body hr { border: 0; border-top: 1px solid #f3f4f6; margin: 1.5rem 0; }
        
        /* User bubble specific markdown overrides */
        .user-bubble .markdown-body h1, 
        .user-bubble .markdown-body h2, 
        .user-bubble .markdown-body h3, 
        .user-bubble .markdown-body p, 
        .user-bubble .markdown-body li, 
        .user-bubble .markdown-body strong { color: white; border-color: rgba(255,255,255,0.2); }
    </style>
