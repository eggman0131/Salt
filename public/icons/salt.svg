<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Salt crystals - geometric composition -->
  
  <!-- Large crystal (primary blue) -->
  <polygon points="64,20 80,45 80,70 64,95 48,70 48,45" fill="#3b82f6" opacity="0.9"/>
  
  <!-- Secondary crystal (cyan accent) -->
  <polygon points="40,55 50,70 45,85 30,80 25,65" fill="#06b6d4" opacity="0.8"/>
  
  <!-- Tertiary crystal (purple accent) -->
  <polygon points="88,55 98,70 93,85 78,80 83,65" fill="#a78bfa" opacity="0.75"/>
  
  <!-- Small granules for texture -->
  <circle cx="35" cy="95" r="3" fill="#3b82f6" opacity="0.6"/>
  <circle cx="50" cy="105" r="2.5" fill="#06b6d4" opacity="0.5"/>
  <circle cx="93" cy="95" r="3" fill="#a78bfa" opacity="0.5"/>
  <circle cx="78" cy="100" r="2" fill="#3b82f6" opacity="0.4"/>
  <circle cx="64" cy="108" r="2.5" fill="#06b6d4" opacity="0.45"/>
  
  <!-- Top highlights (subtle) -->
  <circle cx="65" cy="25" r="2" fill="white" opacity="0.6"/>
  <circle cx="72" cy="35" r="1.5" fill="white" opacity="0.4"/>
</svg>