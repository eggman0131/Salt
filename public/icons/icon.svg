<svg width="512" height="512" viewBox="80 -16 352 352" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="150%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .facet-light { fill: oklch(0.78 0.19 259.76); }
      .facet-mid   { fill: oklch(0.62 0.19 259.76); }
      .facet-dark  { fill: oklch(0.48 0.19 259.76); }
      .facet-glow  { fill: white; fill-opacity: 0.55; }
    </style>
  </defs>

  <g filter="url(#softShadow)">
    <path d="M256 0L352 64L256 128L160 64L256 0Z" class="facet-light"/>
    <path d="M352 64L416 160L352 256L256 192L352 64Z" class="facet-mid"/>
    <path d="M160 64L96 160L160 256L256 192L160 64Z" class="facet-mid"/>
    <path d="M256 192L352 256L256 320L160 256L256 192Z" class="facet-dark"/>
    <path d="M256 0L320 96L256 192L192 96L256 0Z" class="facet-glow"/>
  </g>

</svg>
