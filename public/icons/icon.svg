<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Salt crystals - geometric composition -->
  
  <!-- Large crystal (primary blue) -->
  <polygon points="256,80 320,180 320,280 256,380 192,280 192,180" fill="#3b82f6" opacity="0.9"/>
  
  <!-- Secondary crystal (cyan accent) -->
  <polygon points="160,220 200,280 180,340 120,320 100,260" fill="#06b6d4" opacity="0.8"/>
  
  <!-- Tertiary crystal (purple accent) -->
  <polygon points="352,220 392,280 372,340 312,320 332,260" fill="#a78bfa" opacity="0.75"/>
  
  <!-- Small granules for texture -->
  <circle cx="140" cy="380" r="12" fill="#3b82f6" opacity="0.6"/>
  <circle cx="200" cy="420" r="10" fill="#06b6d4" opacity="0.5"/>
  <circle cx="372" cy="380" r="12" fill="#a78bfa" opacity="0.5"/>
  <circle cx="312" cy="400" r="8" fill="#3b82f6" opacity="0.4"/>
  <circle cx="256" cy="432" r="10" fill="#06b6d4" opacity="0.45"/>
  
  <!-- Top highlights (subtle) -->
  <circle cx="260" cy="100" r="8" fill="white" opacity="0.6"/>
  <circle cx="288" cy="140" r="6" fill="white" opacity="0.4"/>
</svg>
