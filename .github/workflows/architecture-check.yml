name: Architecture Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  architecture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: ESLint
        run: npm run arch:eslint

      - name: Dependency graph (depcruise)
        run: npm run arch:deps

      - name: Module boundary rules
        run: npm run arch:rules

      - name: TypeScript type check
        run: npm run arch:typecheck

      - name: Unit tests
        run: npm run test:run
